<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Perdido en el espacio | Cósmica</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="/favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ========================================= */
/* 1. BASE Y VARIABLES                       */
/* ========================================= */
* { box-sizing: border-box; transition: all .3s ease; }
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: #fff;
  background: #020617;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

/* Fondo Estrellado animado */
body::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.5)),
              url('https://www.transparenttextures.com/patterns/stardust.png');
  z-index: -1;
  opacity: 0.5;
}

/* ========================================= */
/* 2. CONTENIDO 404                          */
/* ========================================= */
.error-container {
  max-width: 600px;
  padding: 20px;
}

.astronaut-icon {
  font-size: 100px;
  margin-bottom: 20px;
  display: inline-block;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0); }
  50% { transform: translateY(-30px) rotate(10deg); }
}

h1 {
  font-size: 80px;
  margin: 0;
  background: linear-gradient(90deg, #22d3ee, #4ade80);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 800;
}

h2 {
  font-size: 24px;
  margin: 10px 0 20px;
  color: #e2e8f0;
}

p {
  color: #94a3b8;
  font-size: 16px;
  margin-bottom: 40px;
  line-height: 1.6;
}

/* ========================================= */
/* 3. BOTONES                                */
/* ========================================= */
.button-group {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
}

.btn-primary {
  background: linear-gradient(90deg, #4ade80, #22c55e);
  color: #022c22;
  box-shadow: 0 0 20px rgba(74,222,128,0.3);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.btn:hover {
  transform: translateY(-3px) scale(1.05);
  filter: brightness(1.1);
}

/* ========================================= */
/* 4. RESPONSIVE                             */
/* ========================================= */
@media (max-width: 480px) {
  h1 { font-size: 60px; }
  h2 { font-size: 20px; }
  .astronaut-icon { font-size: 80px; }
}
</style>
</head>
<body>

  <div class="error-container">
    <div class="astronaut-icon">👨‍🚀</div>
    <h1>404</h1>
    <h2>¡Ups! Te perdiste en el espacio</h2>
    <p>La página que buscás no existe o fue movida a otra órbita. Pero no te preocupes, nuestros técnicos pueden ayudarte a volver.</p>
    
    <div class="button-group">
      <a href="/index.html" class="btn btn-primary">🚀 Volver al Inicio</a>
      <a href="https://wa.me/5493883298736" class="btn btn-secondary">💬 Contactar Soporte</a>
    </div>
  </div>

  <script>
    // Un pequeño detalle: si no hay nada en el historial, el botón de inicio es lo mejor.
    // Pero si queremos ser más pro, podrías agregar un mensaje dinámico.
    console.log("Error 404: Misión Cósmica fuera de curso.");
  </script>

</body>
</html>
